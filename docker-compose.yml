volumes:
    db_data:
        driver: local

services:
    boneframework.docker:
        build:
            context: ./build
            dockerfile: ./httpd/Dockerfile
            args:
                DOMAIN_NAME: '${DOMAIN_NAME}'
        ports:
            - 80:80
            - 443:443
        volumes_from:
            - app

    php:
        build:
            context: ./build
            dockerfile: ./php/Dockerfile
        ports:
            - 9000
        volumes_from:
            - app
        env_file: '.env'
        user: php:staff

    node:
        build: ./build/node
        volumes_from:
            - app
        ports:
            - 8080:8080
            - 3000:3000
            - 19000:19000
            - 19001:19001
            - 19002:19002

    app:
        image: httpd:2.4.38
        volumes:
            - ./code:/var/www/html
            - ../projects/fizzbuzz:/tickets
            - ../projects/octo:/var/www/lab
#            - ../projects/tak:/var/www/html
#           - ../boneframework/bone-native-backend-api:/var/www/html
            - /var/run/docker.sock:/var/run/docker.sock
            - ../projects:/a0/usr/projects
            - ./build/data/a0/usr:/a0/usr
            - /home/delboy1978uk/.ollama:/home/ubuntu/.ollama
            - /home/delboy1978uk/.claude:/home/ubuntu/.claude
        command: "echo true"

    mariadb:
        image: mariadb:10.7.1
        volumes:
            - ./build/data:/docker-entrypoint-initdb.d
            - db_data:/var/lib/mysql
        environment:
            MYSQL_ROOT_PASSWORD: '${MYSQL_ROOT_PASSWORD}'
            MYSQL_USER: '${MYSQL_USER}'
            MYSQL_PASSWORD: '${MYSQL_PASSWORD}'
        ports:
            - 3306:3306

    mail:
        image: mailhog/mailhog
        ports:
            - 1025:1025
            - 8025:8025

    agentzero:
        build: ./build/agentzero
        env_file:
          - .env
        ports:
            - 50080:80
        volumes_from:
            - app

    vllm:
        image: "vllm-node:latest"
        env_file: .env
        ipc: "host"
        command:
            - "vllm"
            - "serve"
            - "GadflyII/Qwen3-Coder-Next-NVFP4"
            - "--enable-auto-tool-choice"
            - "--tool-call-parser"
            - "qwen3_coder"
            - "--gpu-memory-utilization"
            - "0.8"
            - "--host"
            - "0.0.0.0"
            - "--port"
            - "8000"
            - "--kv-cache-dtype"
            - "fp8"
            - "--load-format"
            - "fastsafetensors"
            - "--attention-backend"
            - "flashinfer"
            - "--enable-prefix-caching"
            - "--max-model-len"
            - "auto"
            - "--moe-backend"
            - "cutlass"
        entrypoint:
            - "/opt/nvidia/nvidia_entrypoint.sh"
        ports:
            - 8000:8000
        volumes_from:
            - app
        volumes:
            - ~/.cache/huggingface:/root/.cache/huggingface
            - ~/.cache/vllm:/root/.cache/vllm
        deploy:
            resources:
                reservations:
                    devices:
                        - driver: nvidia
                          count: all
                          capabilities: [gpu, compute, utility]
        environment:
            - NVIDIA_VISIBLE_DEVICES=all
            - NVIDIA_DRIVER_CAPABILITIES=compute,utility
        ulimits:
            memlock: -1
            stack: 67108864


    qwen:
        build:
            context: ./build
            dockerfile: ./qwen/Dockerfile
        volumes_from:
            - app
        volumes:
            - ~/.qwen:/home/node/.qwen
        user: 1000:988
        ports:
            - 3001:3001
 