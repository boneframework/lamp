volumes:
    db_data:
        driver: local

services:
    boneframework.docker:
        build:
            context: ./build
            dockerfile: ./httpd/Dockerfile
            args:
                DOMAIN_NAME: '${DOMAIN_NAME}'
        ports:
            - 80:80
            - 443:443
        volumes_from:
            - app

    php:
        build:
            context: ./build
            dockerfile: ./php/Dockerfile
        ports:
            - 9000
        volumes_from:
            - app
        env_file: '.env'
        user: php:staff

    node:
        build: ./build/node
        volumes_from:
            - app
        ports:
            - 8080:8080
            - 3000:3000
            - 19000:19000
            - 19001:19001
            - 19002:19002

    app:
        image: httpd:2.4.38
        volumes:
            -./code:/var/www/html
#            - ../projects/fizzbuzz:/var/www/html
#            - ../projects/tuner:/var/www/html
#            - ../projects/tak:/var/www/html
#           - ../boneframework/bone-native-backend-api:/var/www/html
            - /var/run/docker.sock:/var/run/docker.sock
            - ../projects:/a0/usr/projects
            - ./build/data/a0/usr:/a0/usr
        command: "echo true"

    mariadb:
        image: mariadb:10.7.1
        volumes:
            - ./build/data:/docker-entrypoint-initdb.d
            - db_data:/var/lib/mysql
        environment:
            MYSQL_ROOT_PASSWORD: '${MYSQL_ROOT_PASSWORD}'
            MYSQL_USER: '${MYSQL_USER}'
            MYSQL_PASSWORD: '${MYSQL_PASSWORD}'
        ports:
            - 3306:3306

    mail:
        image: mailhog/mailhog
        ports:
            - 1025:1025
            - 8025:8025

    agentzero:
        build: ./build/agentzero
        env_file:
          - .env
        ports:
            - 50080:80
        volumes_from:
            - app
