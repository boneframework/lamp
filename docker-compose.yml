volumes:
    db_data:
        driver: local

services:
    boneframework.docker:
        build:
            context: ./build
            dockerfile: ./httpd/Dockerfile
            args:
                DOMAIN_NAME: '${DOMAIN_NAME}'
        ports:
            - 80:80
            - 443:443
        volumes_from:
            - app

    php:
        build:
            context: ./build
            dockerfile: ./php/Dockerfile
        ports:
            - 9000
        volumes_from:
            - app
        env_file: '.env'
        user: php:staff

    node:
        build: ./build/node
        volumes_from:
            - app
        ports:
            - 8080:8080
            - 3000:3000
            - 19000:19000
            - 19001:19001
            - 19002:19002

    app:
        image: httpd:2.4.38
        volumes:
            - ./code:/var/www/html
#            - ../projects/fizzbuzz:/var/www/html
#            - ../projects/tuner:/var/www/html
#            - ../projects/tak:/var/www/html
#           - ../boneframework/bone-native-backend-api:/var/www/html
            - /var/run/docker.sock:/var/run/docker.sock
            - ../projects:/a0/usr/projects
            - ./build/data/a0/usr:/a0/usr
            - /home/delboy1978uk/.ollama:/home/ubuntu/.ollama
            - /home/delboy1978uk/.claude:/home/ubuntu/.claude
        command: "echo true"

    mariadb:
        image: mariadb:10.7.1
        volumes:
            - ./build/data:/docker-entrypoint-initdb.d
            - db_data:/var/lib/mysql
        environment:
            MYSQL_ROOT_PASSWORD: '${MYSQL_ROOT_PASSWORD}'
            MYSQL_USER: '${MYSQL_USER}'
            MYSQL_PASSWORD: '${MYSQL_PASSWORD}'
        ports:
            - 3306:3306

    mail:
        image: mailhog/mailhog
        ports:
            - 1025:1025
            - 8025:8025

    agentzero:
        build: ./build/agentzero
        env_file:
          - .env
        ports:
            - 50080:80
        volumes_from:
            - app

    ollama:
        build:
            context: ./build/ollama
            dockerfile: Dockerfile
        ports:
            - 11434:11434
        volumes_from:
            - app
        user: 1000:1000
        deploy:
            resources:
                reservations:
                    devices:
                        - driver: nvidia
                          # Use all available GPUs
                          count: all
                          capabilities: [gpu]
        environment:
            # Optional: Set specific CUDA devices
            - NVIDIA_VISIBLE_DEVICES=all
            - ANTHROPIC_AUTH_TOKEN=ollama
            - ANTHROPIC_BASE_URL=http://localhost:11434
            - ANTHROPIC_API_KEY=
            - CLAUDE_CODE_MODEL=qgpt-oss:120b
